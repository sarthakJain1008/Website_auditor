# Render Blueprint. The key line is `runtime: docker` — Playwright/Chromium
# needs the Dockerfile to install the browser + system libraries. A native
# Python environment will NOT have Chromium and the audit falls back to the
# (Cloudflare-blocked) requests path.
services:
  - type: web
    name: website-auditor
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free              # 512MB, no card needed. Chromium is memory-tuned in
                            # audit_engine, but may still OOM under load — if you
                            # hit 502s while auditing, bump this to `starter`/`standard`.
    envVars:
      - key: GEMINI_API_KEY   # optional — audit is fully accurate without it
        sync: false
      - key: AGENCY_NAME
        value: Ryotech
